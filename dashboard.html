<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Government Agentic Honey-Pot System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, #0a0a0a, #1a1a1a, #2a2a2a);
            color: #e0e0e0;
            min-height: 100vh;
        }
        .header { 
            background: linear-gradient(135deg, #1a1a1a, #2d2d2d, #404040);
            border-bottom: 2px solid #dc3545;
            color: #ffffff;
            padding: 20px 0;
            box-shadow: 0 4px 20px rgba(220, 53, 69, 0.3);
        }
        .header-content { 
            max-width: 1200px; 
            margin: 0 auto; 
            padding: 0 20px; 
            display: flex; 
            align-items: center; 
        }
        .logo { 
            font-size: 24px; 
            font-weight: bold; 
            margin-right: 30px;
            color: #dc3545;
            text-shadow: 0 0 10px rgba(220, 53, 69, 0.5);
        }
        .nav { display: flex; gap: 30px; }
        .nav a { 
            color: #c0c0c0; 
            text-decoration: none; 
            padding: 10px 15px; 
            border-radius: 5px; 
            transition: all 0.3s;
            border: 1px solid transparent;
        }
        .nav a:hover, .nav a.active { 
            background: linear-gradient(135deg, #dc3545, #b02a37);
            color: white;
            border: 1px solid #dc3545;
            box-shadow: 0 0 15px rgba(220, 53, 69, 0.4);
        }
        
        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        .stats-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); 
            gap: 20px; 
            margin-bottom: 30px; 
        }
        .stat-card { 
            background: linear-gradient(135deg, #2a2a2a, #3a3a3a);
            padding: 25px; 
            border-radius: 10px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            border-left: 4px solid #dc3545;
            border: 1px solid #404040;
        }
        .stat-number { 
            font-size: 32px; 
            font-weight: bold; 
            color: #ffffff;
            margin-bottom: 5px;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
        }
        .stat-label { color: #c0c0c0; font-size: 14px; }
        
        .main-grid { display: grid; grid-template-columns: 1fr 400px; gap: 30px; }
        .panel { 
            background: linear-gradient(135deg, #2a2a2a, #3a3a3a);
            border-radius: 10px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            border: 1px solid #404040;
        }
        .panel-header { 
            padding: 20px; 
            border-bottom: 1px solid #404040;
            font-weight: bold; 
            color: #ffffff;
            background: linear-gradient(135deg, #1a1a1a, #2a2a2a);
            border-radius: 10px 10px 0 0;
        }
        .panel-content { padding: 20px; }
        
        .form-group { margin-bottom: 20px; }
        .form-group label { 
            display: block; 
            margin-bottom: 8px; 
            font-weight: 500; 
            color: #e0e0e0; 
        }
        .form-control { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #404040;
            border-radius: 5px; 
            font-size: 14px;
            background: #1a1a1a;
            color: #e0e0e0;
            transition: all 0.3s;
        }
        .form-control:focus {
            border-color: #dc3545;
            box-shadow: 0 0 10px rgba(220, 53, 69, 0.3);
            outline: none;
        }
        .btn { 
            padding: 12px 24px; 
            border: none; 
            border-radius: 5px; 
            cursor: pointer; 
            font-weight: 500; 
            transition: all 0.3s;
            margin-right: 10px;
        }
        .btn-primary { 
            background: linear-gradient(135deg, #dc3545, #b02a37);
            color: white;
            border: 1px solid #dc3545;
        }
        .btn-primary:hover { 
            background: linear-gradient(135deg, #b02a37, #8e1f2a);
            box-shadow: 0 0 15px rgba(220, 53, 69, 0.4);
        }
        .btn-danger { 
            background: linear-gradient(135deg, #6c757d, #5a6268);
            color: white;
            border: 1px solid #6c757d;
        }
        .btn-danger:hover {
            background: linear-gradient(135deg, #5a6268, #495057);
        }
        
        .response-card { 
            background: linear-gradient(135deg, #1a1a1a, #2a2a2a);
            border: 1px solid #404040;
            border-radius: 8px; 
            padding: 15px; 
            margin: 15px 0;
        }
        .response-card.scam { 
            border-left: 4px solid #dc3545;
            box-shadow: 0 0 15px rgba(220, 53, 69, 0.2);
        }
        .response-card.safe { 
            border-left: 4px solid #28a745;
            box-shadow: 0 0 15px rgba(40, 167, 69, 0.2);
        }
        .threat-badge { 
            display: inline-block; 
            padding: 4px 8px; 
            border-radius: 12px; 
            font-size: 12px; 
            font-weight: bold; 
            text-transform: uppercase;
        }
        .threat-low { background: #28a745; color: white; }
        .threat-medium { background: #ffc107; color: #000; }
        .threat-high { background: #fd7e14; color: white; }
        .threat-critical { background: #dc3545; color: white; }
        
        .conversations-list { max-height: 500px; overflow-y: auto; }
        .conversation-item { 
            padding: 15px; 
            border-bottom: 1px solid #404040;
            cursor: pointer; 
            transition: all 0.3s;
        }
        .conversation-item:hover { 
            background: linear-gradient(135deg, #3a3a3a, #4a4a4a);
            border-left: 3px solid #dc3545;
        }
        .conversation-meta { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 5px; 
        }
        .conversation-id { 
            font-family: 'Courier New', monospace;
            font-size: 12px; 
            color: #c0c0c0;
            background: #1a1a1a;
            padding: 2px 6px;
            border-radius: 3px;
        }
        
        .intelligence-grid { display: grid; gap: 15px; }
        .intelligence-item { 
            background: linear-gradient(135deg, #2a1a1a, #3a2a2a);
            padding: 10px; 
            border-radius: 5px; 
            border-left: 3px solid #dc3545;
            border: 1px solid #404040;
        }
        .intelligence-label { 
            font-weight: bold; 
            color: #dc3545;
            margin-bottom: 5px;
        }
        .intelligence-value { 
            font-family: 'Courier New', monospace;
            font-size: 12px; 
            color: #e0e0e0;
            background: #1a1a1a;
            padding: 4px 8px;
            border-radius: 3px;
        }
        
        .alert { padding: 15px; border-radius: 5px; margin: 15px 0; }
        .alert-success { 
            background: linear-gradient(135deg, #1e4d2b, #2d5a3d);
            color: #ffffff;
            border: 1px solid #28a745;
        }
        .alert-danger { 
            background: linear-gradient(135deg, #4d1e1e, #5a2d2d);
            color: #ffffff;
            border: 1px solid #dc3545;
        }
        .alert-warning { 
            background: linear-gradient(135deg, #4d3d1e, #5a4a2d);
            color: #ffffff;
            border: 1px solid #ffc107;
        }
        
        /* Scrollbar styling */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1a1a1a; }
        ::-webkit-scrollbar-thumb { 
            background: #dc3545;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover { background: #b02a37; }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <div class="logo">🛡️ Government Honey-Pot System</div>
            <nav class="nav">
                <a href="/dashboard" class="active">Dashboard</a>
                <a href="/analytics">Analytics</a>
                <a href="/reports">Reports</a>
                <a href="/settings">Settings</a>
            </nav>
        </div>
    </header>

    <div class="container">
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-number" id="totalConversations">0</div>
                <div class="stat-label">Total Conversations</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="scamDetected">0</div>
                <div class="stat-label">Scams Detected</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="detectionRate">0%</div>
                <div class="stat-label">Detection Rate</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalMessages">0</div>
                <div class="stat-label">Total Messages</div>
            </div>
        </div>

        <div class="main-grid">
            <div class="panel">
                <div class="panel-header">🎯 Scam Detection Test Interface</div>
                <div class="panel-content">
                    <div class="form-group">
                        <label for="conversationId">Conversation ID (Optional)</label>
                        <input type="text" id="conversationId" class="form-control" placeholder="Auto-generated if empty">
                    </div>
                    
                    <div class="form-group">
                        <label for="messageInput">Test Message</label>
                        <textarea id="messageInput" class="form-control" rows="4" placeholder="Enter suspicious message to test scam detection..."></textarea>
                    </div>
                    
                    <div class="form-group">
                        <button onclick="sendTestMessage()" class="btn btn-primary">🔍 Analyze Message</button>
                        <button onclick="clearResults()" class="btn btn-danger">🗑️ Clear Results</button>
                    </div>
                    
                    <div id="testResults"></div>
                </div>
            </div>

            <div class="panel">
                <div class="panel-header">📊 Recent Conversations</div>
                <div class="panel-content">
                    <div class="conversations-list" id="conversationsList">
                        <div class="alert alert-warning">Loading conversations...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = 'gov-api-key-2024';
        const API_BASE = 'http://localhost:5000';

        async function loadDashboard() {
            try {
                const statsResponse = await fetch(`${API_BASE}/api/stats`, {
                    headers: { 'X-API-Key': API_KEY }
                });
                
                if (statsResponse.ok) {
                    const stats = await statsResponse.json();
                    document.getElementById('totalConversations').textContent = stats.total_conversations;
                    document.getElementById('scamDetected').textContent = stats.scam_conversations;
                    document.getElementById('detectionRate').textContent = stats.detection_rate.toFixed(1) + '%';
                    document.getElementById('totalMessages').textContent = stats.total_messages;
                }

                const conversationsResponse = await fetch(`${API_BASE}/api/conversations`, {
                    headers: { 'X-API-Key': API_KEY }
                });
                
                if (conversationsResponse.ok) {
                    const conversations = await conversationsResponse.json();
                    displayConversations(conversations);
                }
            } catch (error) {
                document.getElementById('conversationsList').innerHTML = 
                    '<div class="alert alert-danger">Error loading data. Ensure server is running.</div>';
            }
        }

        function displayConversations(conversations) {
            const container = document.getElementById('conversationsList');
            
            if (conversations.length === 0) {
                container.innerHTML = '<div class="alert alert-warning">No conversations yet.</div>';
                return;
            }

            container.innerHTML = conversations.map(conv => `
                <div class="conversation-item">
                    <div class="conversation-meta">
                        <span class="conversation-id">${conv.id.substring(0, 8)}...</span>
                        <span class="threat-badge threat-${conv.threat_level}">${conv.threat_level}</span>
                    </div>
                    <div>IP: ${conv.ip_address} | Turns: ${conv.total_turns}</div>
                    <div style="font-size: 12px; color: #999;">${new Date(conv.start_time).toLocaleString()}</div>
                </div>
            `).join('');
        }

        async function sendTestMessage() {
            const message = document.getElementById('messageInput').value.trim();
            const conversationId = document.getElementById('conversationId').value.trim();
            
            if (!message) {
                alert('Please enter a message to test.');
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/api/message`, {
                    method: 'POST',
                    headers: {
                        'X-API-Key': API_KEY,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: message,
                        conversation_id: conversationId || undefined
                    })
                });

                const data = await response.json();
                displayTestResult(message, data);
                setTimeout(loadDashboard, 1000);
                
            } catch (error) {
                document.getElementById('testResults').innerHTML = 
                    '<div class="alert alert-danger">Error: Could not connect to API.</div>';
            }
        }

        function displayTestResult(userMessage, data) {
            const resultsDiv = document.getElementById('testResults');
            const isScam = data.scam_detected;
            const analysis = data.scam_analysis;
            const intelligence = data.extracted_intelligence;
            
            let intelligenceHtml = '';
            if (intelligence) {
                const hasIntel = Object.values(intelligence).some(arr => Array.isArray(arr) && arr.length > 0);
                if (hasIntel) {
                    intelligenceHtml = '<div class="intelligence-grid">';
                    Object.entries(intelligence).forEach(([key, values]) => {
                        if (Array.isArray(values) && values.length > 0) {
                            intelligenceHtml += `
                                <div class="intelligence-item">
                                    <div class="intelligence-label">${key.replace('_', ' ').toUpperCase()}</div>
                                    <div class="intelligence-value">${values.join(', ')}</div>
                                </div>
                            `;
                        }
                    });
                    intelligenceHtml += '</div>';
                }
            }
            
            resultsDiv.innerHTML = `
                <div class="response-card ${isScam ? 'scam' : 'safe'}">
                    <h4>📝 Analysis Result</h4>
                    <p><strong>Message:</strong> ${userMessage}</p>
                    <p><strong>Scam Detected:</strong> ${isScam ? '🚨 YES' : '✅ NO'}</p>
                    <p><strong>Confidence:</strong> ${analysis.confidence}%</p>
                    <p><strong>Threat Level:</strong> <span class="threat-badge threat-${analysis.threat_level}">${analysis.threat_level}</span></p>
                    <p><strong>Agent Response:</strong> ${data.agent_response || 'No response (not a scam)'}</p>
                    <p><strong>Turn Count:</strong> ${data.engagement_metrics.turn_count}</p>
                    ${intelligenceHtml ? '<h5>🎯 Extracted Intelligence:</h5>' + intelligenceHtml : ''}
                </div>
            `;
        }

        function clearResults() {
            document.getElementById('testResults').innerHTML = '';
            document.getElementById('messageInput').value = '';
        }

        setInterval(loadDashboard, 30000);
        loadDashboard();

        document.getElementById('messageInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && e.ctrlKey) {
                sendTestMessage();
            }
        });
    </script>
</body>
</html>
